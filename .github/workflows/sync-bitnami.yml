name: Sync Bitnami Shell Image
run-name: ${{ github.actor }} syncing bitnami-shell to ACR

on:
  workflow_dispatch:

env:
  REGISTRY: registry.cn-guangzhou.aliyuncs.com
  NAMESPACE: tools_y

jobs:
  sync-image:
    runs-on: ubuntu-latest
    steps:
      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Sync image to Aliyun ACR
        run: |
          SOURCE="docker.io/bitnami/bitnami-shell:10-debian-10-r301"
          TARGET="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/bitnami-shell:10-debian-10-r301"
          echo "🚀 Syncing: $SOURCE -> $TARGET"
          skopeo copy --all \
            --dest-creds "${{ secrets.DOCKER_USERNAME }}:${{ secrets.DOCKER_PASSWORD }}" \
            "docker://$SOURCE" "docker://$TARGET" || (docker pull "$SOURCE" && docker tag "$SOURCE" "$TARGET" && docker push "$TARGET")
