name: CI - Helm Chart Lint & Image Sync
run-name: ${{ github.actor }} triggered CI pipeline

permissions:
  contents: write  # 允许 GITHUB_TOKEN 写回仓库

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: registry.cn-guangzhou.aliyuncs.com
  NAMESPACE: tools_y

jobs:
  # ==================== 第一步: Helm Chart 校验 ====================
  lint:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Chart
        run: helm lint .

      - name: Template Render Test
        run: helm template test-release . --debug

  # ==================== 第二步: 同步镜像到阿里云 ACR ====================
  sync-image:
    name: Sync Image to Aliyun ACR
    runs-on: ubuntu-latest
    needs: lint   # lint 通过后才执行
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.extract.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract image info from values.yaml
        id: extract
        run: |
          REPO=$(grep 'repository:' values.yaml | head -1 | awk '{print $2}')
          TAG=$(grep 'tag:' values.yaml | head -1 | awk '{print $2}')
          echo "source_image=${REPO}:${TAG}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          # 从 repository 路径中提取镜像名 (最后一段)
          IMG_NAME=$(echo "$REPO" | awk -F'/' '{print $NF}')
          echo "image_name=${IMG_NAME}" >> $GITHUB_OUTPUT
          echo "📦 Source: ${REPO}:${TAG}"
          echo "🎯 Target: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${IMG_NAME}:${TAG}"

      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Sync image to Aliyun ACR
        run: |
          set -euo pipefail
          SOURCE="${{ steps.extract.outputs.source_image }}"
          TARGET="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ steps.extract.outputs.image_name }}:${{ steps.extract.outputs.tag }}"
          echo "🚀 Syncing: $SOURCE -> $TARGET"
          if ! skopeo copy --all \
            --dest-creds "${{ secrets.DOCKER_USERNAME }}:${{ secrets.DOCKER_PASSWORD }}" \
            "docker://$SOURCE" "docker://$TARGET"; then
            echo "⚠️ Skopeo copy failed, trying docker pull/push..."
            docker pull "$SOURCE"
            docker tag "$SOURCE" "$TARGET"
            docker push "$TARGET"
          fi
          echo "✅ Image synced: $TARGET"

      - name: Verify target has arm64
        run: |
          set -euo pipefail
          TARGET="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ steps.extract.outputs.image_name }}:${{ steps.extract.outputs.tag }}"
          skopeo inspect --raw "docker://$TARGET" | grep -q '"architecture":"arm64"'
          echo "✅ arm64 present in $TARGET"

  # ==================== 第三步: 更新 Chart 中的镜像地址指向阿里云 ====================
  update-chart:
    name: Update Chart Image to ACR
    runs-on: ubuntu-latest
    needs: sync-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update values.yaml image repository to ACR
        run: |
          # 读取当前镜像名
          CURRENT_REPO=$(grep 'repository:' values.yaml | head -1 | awk '{print $2}')
          IMG_NAME=$(echo "$CURRENT_REPO" | awk -F'/' '{print $NF}')
          NEW_REPO="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${IMG_NAME}"

          # 如果已经是阿里云地址则跳过
          if grep -q "${{ env.REGISTRY }}" values.yaml; then
            echo "✅ Already using ACR, skipping update"
            exit 0
          fi

          # 替换 repository 地址
          sed -i "s|repository: .*${IMG_NAME}.*|repository: ${NEW_REPO}|g" values.yaml
          echo "📝 Updated image repository to: ${NEW_REPO}"
          cat values.yaml | grep -A2 'image:'

      - name: Commit and Push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add values.yaml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "ci: update image repository to Aliyun ACR [skip ci]"
          git push
          echo "🎯 Pushed! ArgoCD will auto-sync this change to the cluster."
