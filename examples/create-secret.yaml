apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-cluster-credentials
  namespace: your-namespace
type: Opaque
data:
  # 使用以下命令生成 base64 编码的密码:
  # echo -n "your-password" | base64
  rabbitmq-password: cGFzc3dvcmQxMjM=  # 'password123' base64 编码
  
  # 使用以下命令生成 base64 编码的 Erlang cookie:
  # echo -n "ERLANG-COOKIE-EXAMPLE" | base64
  rabbitmq-erlang-cookie: RVJMQU5HLUNPT0tJRS1FWEFNUExF  # 'ERLANG-COOKIE-EXAMPLE' base64 编码 