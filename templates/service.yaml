apiVersion: v1
kind: Service
metadata:
  name: {{ include "rabbitmq-chart.fullname" . }}
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    {{- include "rabbitmq-chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.rabbitmq.service.type }}
  ports:
  {{- range $key, $value := .Values.rabbitmq.service.ports }}
  - name: {{ $key }}
    port: {{ $value }}
    targetPort: {{ $key }}
    protocol: TCP
  {{- end }}
  selector:
    {{- include "rabbitmq-chart.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rabbitmq-chart.fullname" . }}-headless
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    {{- include "rabbitmq-chart.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
  {{- range $key, $value := .Values.rabbitmq.service.ports }}
  - name: {{ $key }}
    port: {{ $value }}
    targetPort: {{ $key }}
    protocol: TCP
  {{- end }}
  selector:
    {{- include "rabbitmq-chart.selectorLabels" . | nindent 4 }} 