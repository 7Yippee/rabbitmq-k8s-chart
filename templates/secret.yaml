apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rabbitmq-chart.fullname" . }}
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    {{- include "rabbitmq-chart.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.rabbitmq.auth.existingSecret }}
  # If using an existing secret, we don't generate anything
  {{- else }}
  rabbitmq-erlang-cookie: {{ .Values.rabbitmq.auth.erlangCookie | default (randAlphaNum 32) | b64enc | quote }}
  rabbitmq-password: {{ .Values.rabbitmq.auth.password | default (randAlphaNum 10) | b64enc | quote }}
  {{- end }}
